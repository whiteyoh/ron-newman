<svg width="1600" height="520" viewBox="0 0 1600 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Glytch banner - See more. Know more.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="55%" stop-color="#07152d"/>
      <stop offset="100%" stop-color="#17051f"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6ee7ff"/>
      <stop offset="45%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#f472d0"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#f472d0"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.3" fill="#38bdf8" opacity="0.26"/>
    </pattern>
  </defs>

  <rect width="1600" height="520" rx="26" fill="url(#bg)"/>
  <rect width="1600" height="520" rx="26" fill="url(#dots)" opacity="0.38"/>

  <path d="M28 30 H292 L322 10 H530" stroke="#22d3ee" stroke-width="2" opacity="0.75" fill="none"/>
  <path d="M1070 30 H1370 L1398 52 H1554" stroke="#f472d0" stroke-width="2" opacity="0.75" fill="none"/>
  <path d="M28 486 H370" stroke="#22d3ee" stroke-width="2" opacity="0.65"/>
  <path d="M1180 486 H1572" stroke="#f472d0" stroke-width="2" opacity="0.65"/>

  <g opacity="0.28">
    <path d="M0 388 C120 340 210 420 340 380 S580 320 760 390 S1040 444 1220 370 S1430 320 1600 378" stroke="#0ea5e9" stroke-width="2" fill="none"/>
    <path d="M0 410 C120 362 210 442 340 402 S580 342 760 412 S1040 466 1220 392 S1430 342 1600 400" stroke="#22d3ee" stroke-width="1.5" fill="none" opacity="0.55"/>
    <path d="M0 435 C120 387 210 467 340 427 S580 367 760 437 S1040 491 1220 417 S1430 367 1600 425" stroke="#a855f7" stroke-width="1.5" fill="none" opacity="0.5"/>
  </g>

  <g transform="translate(960 112)" filter="url(#softGlow)">
    <path d="M170 0 L318 86 L318 244 L170 330 L22 244 L22 86 Z" fill="none" stroke="#22d3ee" stroke-width="6" opacity="0.75"/>
    <path d="M196 42 L286 94 L286 218 L196 270 L82 270 L82 190 L130 190 L130 230 L184 230 L246 194 L246 118 L184 82 L94 82 L94 146 L52 146 L52 94 Z" fill="none" stroke="url(#line)" stroke-width="18" stroke-linejoin="round" opacity="0.95"/>
  </g>

  <g transform="translate(86 92)">
    <text x="0" y="0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="32" letter-spacing="18" fill="#e5e7eb" opacity="0.92">GLYTCH</text>
    <text x="0" y="142" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="112" font-weight="800" letter-spacing="4" fill="url(#brand)" filter="url(#glow)">See more.</text>
    <text x="0" y="256" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="112" font-weight="800" letter-spacing="4" fill="#f8fafc">Know more.</text>
    <rect x="0" y="296" width="6" height="76" fill="url(#line)"/>
    <text x="34" y="326" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="33" fill="#f8fafc">Helping people understand AI beyond the chat box.</text>
    <text x="34" y="368" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" fill="#94a3b8">AI judgement, not just AI prompts.</text>
  </g>

  <g transform="translate(1355 212)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24">
    <text x="0" y="0" fill="#94a3b8">Context.</text>
    <text x="0" y="38" fill="#94a3b8">Evaluate.</text>
    <text x="0" y="76" fill="#94a3b8">Understand.</text>
    <text x="0" y="114" fill="#f472d0">Decide.</text>
  </g>

  <g opacity="0.85">
    <circle cx="1226" cy="420" r="4" fill="#22d3ee"/>
    <path d="M1236 420 H1310 L1330 440 H1408" stroke="#22d3ee" stroke-width="2" fill="none" opacity="0.45"/>
    <circle cx="1482" cy="286" r="4" fill="#f472d0"/>
    <path d="M1360 286 H1468" stroke="#f472d0" stroke-width="2" fill="none" opacity="0.45"/>
  </g>
</svg>
