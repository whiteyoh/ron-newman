<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="880" viewBox="0 0 1400 880" role="img" aria-labelledby="title desc">
  <title id="title">Glytch level comparison map</title>
  <desc id="desc">Eight cards showing the Glytch levels from prompting to orchestration.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .card { fill: #ffffff; stroke: #0f172a; stroke-width: 2; rx: 16; ry: 16; }
      .h { fill: #0f172a; font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 27px; font-weight: 700; }
      .p { fill: #334155; font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 20px; }
      .a { fill: #dbeafe; }
      .b { fill: #dcfce7; }
      .c { fill: #fef3c7; }
      .d { fill: #f3e8ff; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="880"/>

  <g transform="translate(70,80)">
    <rect class="card a" x="0" y="0" width="290" height="160"/>
    <text class="h" x="22" y="54">Level 1</text>
    <text class="p" x="22" y="92">Prompt baseline</text>
    <text class="p" x="22" y="124">One answer, human decides</text>

    <rect class="card b" x="330" y="0" width="290" height="160"/>
    <text class="h" x="352" y="54">Level 2</text>
    <text class="p" x="352" y="92">Instruction framing</text>
    <text class="p" x="352" y="124">Clear format and limits</text>

    <rect class="card c" x="660" y="0" width="290" height="160"/>
    <text class="h" x="682" y="54">Level 3</text>
    <text class="p" x="682" y="92">Tool-assisted run</text>
    <text class="p" x="682" y="124">Checkable helper step</text>

    <rect class="card d" x="990" y="0" width="290" height="160"/>
    <text class="h" x="1012" y="54">Level 4</text>
    <text class="p" x="1012" y="92">Evidence grounding</text>
    <text class="p" x="1012" y="124">Tied to supplied facts</text>

    <rect class="card b" x="0" y="220" width="290" height="160"/>
    <text class="h" x="22" y="274">Level 5</text>
    <text class="p" x="22" y="312">Planning structure</text>
    <text class="p" x="22" y="344">Visible sequence of tasks</text>

    <rect class="card c" x="330" y="220" width="290" height="160"/>
    <text class="h" x="352" y="274">Level 6</text>
    <text class="p" x="352" y="312">Critique and revise</text>
    <text class="p" x="352" y="344">Draft then improve</text>

    <rect class="card d" x="660" y="220" width="290" height="160"/>
    <text class="h" x="682" y="274">Level 7</text>
    <text class="p" x="682" y="312">Controlled loop</text>
    <text class="p" x="682" y="344">Observe-act-check-stop</text>

    <rect class="card a" x="990" y="220" width="290" height="160"/>
    <text class="h" x="1012" y="274">Level 8</text>
    <text class="p" x="1012" y="312">Orchestration</text>
    <text class="p" x="1012" y="344">Workers, gates, merge</text>
  </g>

  <text class="p" x="70" y="780">Core message: choose the lowest safe level that gets the task done with clear human review.</text>
</svg>
