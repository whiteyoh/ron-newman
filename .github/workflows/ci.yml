name: CI

on:
  workflow_dispatch:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-smoke-run:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: gpt-4.1-mini
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Quality checks
        run: |
          python -m ruff format --check .
          python -m ruff check .
          python -m mypy app.py src
          python -m pytest -q
      - name: App smoke test
        run: |
          PORT=18000 python app.py > app.log 2>&1 &
          APP_PID=$!
          trap 'kill $APP_PID 2>/dev/null || true' EXIT
          sleep 2
          curl -fsS http://127.0.0.1:18000/healthz
          curl -fsS http://127.0.0.1:18000/api/levels
          curl -fsS -X POST http://127.0.0.1:18000/api/run -H 'content-type: application/json' -d '{"level":1}'
      - name: Optional live OpenAI smoke test
        if: ${{ env.OPENAI_API_KEY != '' }}
        run: |
          PORT=18001 python app.py > app-openai.log 2>&1 &
          APP_PID=$!
          trap 'kill $APP_PID 2>/dev/null || true' EXIT
          sleep 2
          curl -fsS -X POST http://127.0.0.1:18001/api/run -H 'content-type: application/json' -d '{"level":1}' > /tmp/openai.json
          python - <<'PY'
          import json
          p = json.load(open('/tmp/openai.json'))
          assert p.get('lines')
          print('Live smoke ok')
          PY
