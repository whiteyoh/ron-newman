name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test-and-smoke-run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Run tests
        run: python -m pytest -q

      - name: Start app and verify API responds
        run: |
          python app.py > app.log 2>&1 &
          APP_PID=$!
          trap 'kill $APP_PID' EXIT

          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:8000/api/levels > /tmp/levels.json; then
              break
            fi
            sleep 1
          done

          test -s /tmp/levels.json
